name: OriginsPaper
version: "1.1.0"
main: dev.originspaper.OriginsPaper
api-version: "26.1"
description: Sistema de Origens (Origins) para Paper 26.1.2
authors: [OriginsPaper]
commands:
  origin:
    description: Gerencie sua origem
    usage: /origin [set|reset|info] [jogador] [origem]
permissions:
  originspaper.select:
    description: Permite abrir o menu de seleção de origem e ver informações
    default: true
  originspaper.admin:
    description: Permite gerenciar as origens de outros jogadores
    default: op
